@Kronometer:FOR[MRKITweaks]
{
	%useHomeDay = true
	%useHomeYear = true
	%resetMonthNumAfterMonths = 12
	%resetMonthsAfterYears = 1
	!DisplayDate,* {}
	!Months,* {}

	DisplayDate
	{
		PrintDate
		{
			offsetTime = 36000
			offsetDay = 1
			offsetYear = 1
			displayDate = <Dm><Dmth> of <Mo1>, Year <Y>
			displayTime = < - <H:00>:<M:00>
			displaySeconds = :<S:00>
		}
		
		PrintDateNew
		{
			offsetTime = 36000
			offsetDay = 1
			offsetYear = 1
			displayDate = <Dm><Dmth> of <Mo1>, Year <Y>
			displayTime = < - <H:00>:<M:00>
			displaySeconds = :<S:00>
		}
		
		PrintDateCompact
		{
			offsetTime = 36000
			offsetDay = 1
			offsetYear = 1
			displayDate = <Dm><Dmth> of <Mo1>, Year <Y>
			displayTime = < - <H:00>:<M:00>
			displaySeconds = :<S:00>
		}
	}
