// Compute Kerbin's sidereal rotation period for the desired synodic period
@Kopernicus:HAS[@Body[Kerbin]:HAS[#identifier[MRKI/Kerbin]]]:AFTER[MRKITweaks]
{
	@Body[Kerbin]:HAS[#identifier[MRKI/Kerbin]]
	{
		@Properties
		{
			// Synodic rotational period:								t_Syn = 1/(1/t_Sid - 1/T_K)
			// => Sidereal rotational period:							t_Sid = 1/(1/t_Syn + 1/T_K) = t_Syn*T_K/(t_Syn + T_K)

			%sum = #$@MRKITweaksSettings/dayLength$						// t_Syn
			@sum += #$@MRKITweaksSettings/orbitalPeriod$				// t_Syn + T_K
			%rotationPeriod = #$@MRKITweaksSettings/dayLength$			// t_Syn
			@rotationPeriod *= #$@MRKITweaksSettings/orbitalPeriod$		// t_Syn*T_K
			@rotationPeriod /= #$sum$									// t_Syn*T_K/(t_Syn + T_K) = T_Sid
		}
	}
}

// Adjust Kronometer clock offset time to account for the day length and initial rotation of Kerbin
@Kronometer:AFTER[MRKITweaks]
{
	%useHomeDay = true

	%offsetTime = #$@Kopernicus/Body[Kerbin]/Properties/initialRotation$
	@offsetTime += #$@Kopernicus/Body[Kerbin]/PQS/Mods/City/reorientFinalAngle$
	@offsetTime /= -360
	@offsetTime += 0.5
	@offsetTime *= #$@MRKITweaksSettings/dayLength$

	@DisplayDate
	{
		@PrintDate
		{
			%offsetTime = #$../../offsetTime$
		}
		
		@PrintDateNew
		{
			%offsetTime = #$../../offsetTime$
		}
		
		@PrintDateCompact
		{
			%offsetTime = #$../../offsetTime$
		}
	}
}