// Resize some planets and moons to more realistic values for their surface gravity
@Kopernicus:HAS[@Body:HAS[#identifier[MRKI/*]]]:FOR[MRKITweaks]
{
	@Body[Eve]
	{
		@Properties
		{
			@radius = 2080000 // 1715000
		}
	}
	@Body[Gilly]
	{
		@Properties
		{
			@radius = 48000 // 17500
		}
	}
	@Body[Minmus]
	{
		@Properties
		{
			@radius = 216000 // 107000
		}
	}
	@Body[Laythe]
	{
		@Properties
		{
			@radius = 1104000 // 1335000
		}
	}
	@Body[Bop]
	{
		@Properties
		{
			@radius = 56000 // 25000
		}
	}
	@Body[Pol]
	{
		@Properties
		{
			@radius = 120000 // 44000
		}
	}
}