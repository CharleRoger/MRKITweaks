// Compute the Mun's semi-major axis to yield the desired number of synodic months per year
@Kopernicus:HAS[@Body[Mun]:HAS[#identifier[MRKI/Mun]]]:AFTER[MRKITweaks]
{
	@Body[Mun]:HAS[#identifier[MRKI/Mun]]
	{
		@Orbit
		{
			// Mun orbital period:										T_M = 2π√(a_M³/(G*M_K)) = T_K/(n + 1)
			// => Mun semi-major axis:									a_M = (G*M_K*T_M²/4π²)^⅓

			%semiMajorAxis = #$@MRKITweaksSettings/monthsPerYear$		// n
			@semiMajorAxis += 1											// n + 1
			@semiMajorAxis /= #$../../Body[Kerbin]/Properties/radius$	// (n + 1)/R_K
			@semiMajorAxis != 2											// ((n + 1)/R_K)²
			@semiMajorAxis *= #$@MRKITweaksSettings/angFreqSquared$		// (2π(n + 1)/(R_K*T_K))² = (2π/(R_K*T_M))²
			@semiMajorAxis /= 9.80665									// 4π²/(g_E*R_K²*T_M²)
			@semiMajorAxis /= #$../../Body[Kerbin]/Properties/geeASL$	// 4π²/(g_K*R_K²*T_M²) = 4π²/(G*M_K*T_M²)
			@semiMajorAxis != -0.3333333333333333						// (G*M_K*T_M²/4π²)^⅓ = a_M
		}
	}
}