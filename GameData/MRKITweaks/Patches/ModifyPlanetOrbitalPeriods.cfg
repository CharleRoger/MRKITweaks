// Compute the Sun's mass to yield the desired year length
@Kopernicus:HAS[@Body[Sun]:HAS[#identifier[MRKI/Kerbol]]]:AFTER[MRKITweaks]
{
	@Body[Sun]:HAS[#identifier[MRKI/Kerbol]]
	{
		@Properties
		{
			// Kerbin orbital period:									T_K = 2π√(a_K³/(G*M_S))
			// => Sun mass:												M_S = 4π²a_K³/(G*T_K²)

			%mass = #$../../Body[Kerbin]/Orbit/semiMajorAxis$			// a_K
			@mass != 3													// a_K³
			@mass /= 6.67408E-11										// a_K³/G
			@mass *= #$@MRKITweaksSettings/angFreqSquared$				// 4π²a_K³/(G*T_K²) = M_S
		}
	}
}