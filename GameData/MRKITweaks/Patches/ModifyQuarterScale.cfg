// Slightly adjust the size of some planets and moons to yield x2.666666... scale rather than x2.67
@Kopernicus:HAS[@Body:HAS[#identifier[MRKI/*]]]:BEFORE[MRKITweaks]
{
	@Body[Moho]
	{
		@Properties
		{
			@radius = 632000 // 633858
		}
	}
	@Body[Eve]
	{
		@Properties
		{
			@radius = 1712000 // 1715000
		}
	}
	@Body[Gilly]
	{
		@Properties
		{
			@radius = 16000 // 17500
		}
	}
	@Body[Kerbin]
	{
		@Properties
		{
			@radius = 1600000 // 1602000
		}
	}
	@Body[Minmus]
	{
		@Properties
		{
			@radius = 104000 // 107000
		}
	}
	@Body[Mun]
	{
		@Properties
		{
			@radius = 536000 // 534000
		}
	}
	@Body[Duna]
	{
		@Properties
		{
			@radius = 864000 // 867840
		}
	}
	@Body[Ike]
	{
		@Properties
		{
			@radius = 344000 // 347100
		}
	}
	@Body[Jool]
	{
		@Properties
		{
			@radius = 18400000 // 18423000
		}
	}
	@Body[Laythe]
	{
		@Properties
		{
			@radius = 1336000 // 1335000
		}
	}
	@Body[Vall]
	{
		@Properties
		{
			@radius = 536000 // 533466
		}
	}
	@Body[Tylo]
	{
		@Properties
		{
			@radius = 1496000 // 1495200
