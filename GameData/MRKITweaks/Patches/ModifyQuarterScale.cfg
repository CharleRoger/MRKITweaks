// Adjust the Stock scale option with respect to the new Quarter scale
@Kopernicus:HAS[@MRKI_Settings:HAS[#SystemScale[Stock]]]:BEFORE[SigDim2]:NEEDS[SigDim]
{
	@Body:HAS[#identifier[MRKI/*]]
	{
		@SigmaDimensions
		{
			@Resize = 0.375
			@Rescale = 0.375
		}
	}
}