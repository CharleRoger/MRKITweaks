MRKITweaksSettings
{
	dayLength = 86400
	daysPerYear = 180
	// Determines Kerbin's rotationPeriod:
	// =>			= 85922.6519337
	// c.f. default	= 86,400
	// ... and the Sun's mass:
	// =>			= 1.17093028495910E+29
	// c.f. MRKI	= 1.75654591319326E+28

	monthsPerYear = 12
	// With the above and Kerbin's radius, determines the Mun's semiMajorAxis:
	// =>			= 96,908,580.372 using 1,600km Kerbin as per ModifyBodySizes
	// =>			= 96,989,320.707 using 1,602km Kerbin as per default MRKI
	// c.f. MRKI	= 95,032,222.242
}

// Some useful computation
@MRKITweaksSettings:BEFORE[MRKITweaks]
{
	%orbitalPeriod = #$dayLength$		// t_Syn
	@orbitalPeriod *= #$daysPerYear$	// T_K

	%angFreqSquared = 6.283185307179586	// 2π
	@angFreqSquared /= #$orbitalPeriod$	// 2π/T_K = Kerbin orbital angular frequency
	@angFreqSquared != 2				// 4π²/T_K²
}